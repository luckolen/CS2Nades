<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Utility Missing</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: var(--accent-color);
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            color: #a8b2c1;
            margin: 15px 0 30px 0;
        }
        .back-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <!--<p class="error-message">Lineup map variable missing, invalid, or out of bounds.</p>-->
        <a href="/" class="back-btn">← Return to Strategy Index</a>
    </div>
</body>
</html>
