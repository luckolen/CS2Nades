<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Utility Tracker</title>
    <!-- Linked Global Stylesheet -->
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <header>
        <h1>CS2 UTILITY INDEX</h1>
        <p class="subtitle">Select a map to view lineups</p>
    </header>

    <main class="map-grid">

        <!-- CACHE -->
        <a href="maps/?map=cache" class="map-card">
            <div class="map-name">DE_CACHE</div>
            <div class="map-status active">Active</div>
        </a>

        <!-- MIRAGE -->
        <a href="maps/?map=mirage" class="map-card">
            <div class="map-name">DE_MIRAGE</div>
            <div class="map-status active">Work in progress</div>
        </a>

        <!-- DUST 2 -->
        <a href="maps/?map=dust2" class="map-card">
            <div class="map-name">DE_DUST2</div>
            <div class="map-status active">Work in progress</div>
        </a>

        <!-- INFERNO -->
        <a href="#" class="map-card">
            <div class="map-name">DE_INFERNO</div>
            <div class="map-status pending">TODO</div>
        </a>

        <!-- Nuke -->
        <a href="maps/?map=nuke" class="map-card">
            <div class="map-name">DE_NUKE</div>
            <div class="map-status active">Work in progress</div>
        </a>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
